<!DOCTYPE html>
<!--
═════════════════════════════════════════════════════════════════════════
  Appin.site · 技艺录（craft）文章模板  B（文档/手册式 · 2026-07-20 设计）
  与 v2（article.css 居中 hero 体系）明显区分：三栏布局（左常驻目录 / 中阅读栏 / 右元信息栏），
  强调色改用靛紫 #6366f1（v2 为品牌绿）。自带内联 CSS + 轻量 JS，不依赖 article.css，是独立模板。
  占位符与 v2 完全兼容（同名），正文可 1:1 移植。
═════════════════════════════════════════════════════════════════════════

【1】占位符清单（全局替换，发布前确保无残留 {{...}}）
  {{TITLE}}         页面 <title> + og:title + twitter:title（含【WB】前缀）
  {{EXCERPT}}       description + og:description + twitter:description + 导语 lead
  {{SLUG}}          文章短链名，如 quark-to-aliyun-sync（用于 canonical / og:url）
  {{HERO_COVER}}    封面绝对路径：/uploads/{{SLUG}}-cover.webp
  {{HERO_BADGE}}    hero 顶部小标签，如「实战案例 · 网盘自动化」
  {{TITLE_HTML}}    h1 主标题（可含 <strong> 强调）
  {{HERO_META}}     meta 行内若干 <span>分类</span><span class="dot"></span> 组合（3~4 个）
  {{TOC_LINKS}}     目录 <li><a href="#s1">…</a></li> 列表（每章一条，对应正文 h2 的 id）
  {{BODY}}           正文全部章节（见下方区块库示例，删掉示例写你自己的）
  {{TAGS}}           标签云 <a href="/craft/">标签</a> 列表（8~12 个），本模板置于右侧栏
  {{DATE}}           发布日期，如 2026.07.20
  {{CATEGORY}}      栏目目录名：craft
  {{CATEGORY_LABEL}} 栏目中文名：技艺录

【2】素材纪律（同 v2，务必遵守）
  · 封面横图（宽高比 ≥ 1.5）；png 被 .gitignore 忽略，统一用 jpg / webp
  · 凭证（IP / 密码 / Cookie / Token）一律打码为 **** 或示例占位
  · 重要句子用 <span class="key">…</span> 强调（本模板为靛紫加粗）

【3】发布动作
  1. 复制本文件 → craft/<slug>.html，替换全部 {{...}}
  2. 封面 uploads/<slug>-cover.webp
  3. content.json 的 articles 数组末尾追加（id = 最大+1，template 可记 "DP-B" 区分）
  4. 更新 craft/index.html 静态列表
  5. git add . && git commit && git push → GitHub Actions 自动部署
═════════════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{EXCERPT}}">
<link rel="icon" href="/favicon.ico">
<link rel="canonical" href="https://www.appin.site/craft/{{SLUG}}.html">
<meta property="og:type" content="website">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{EXCERPT}}">
<meta property="og:url" content="https://www.appin.site/craft/{{SLUG}}.html">
<meta property="og:site_name" content="Appin.site">
<meta property="og:locale" content="zh_CN">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{EXCERPT}}">
<meta property="og:image" content="https://www.appin.site/uploads/{{SLUG}}-cover.webp">
<meta name="twitter:image" content="https://www.appin.site/uploads/{{SLUG}}-cover.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1115; --bg-soft:#161a21; --panel:#1b212b; --panel-2:#212a36;
  --fg:#e8ecf2; --fg-dim:#9aa6b2; --line:#2a313c;
  --accent:#6366f1; --accent-2:#a78bfa; --accent-soft:rgba(99,102,241,.12);
  --key:#818cf8; --radius:14px; --maxw:780px;
}
  --bg:#f6f7fb; --bg-soft:#ffffff; --panel:#ffffff; --panel-2:#f0f2f8;
  --fg:#1a2230; --fg-dim:#5b6675; --line:#e4e8f0;
  --accent:#5b5ef0; --accent-2:#7c6ff0; --accent-soft:rgba(91,94,240,.10);
  --key:#5b5ef0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--fg);
  font-family:'Space Grotesk','PingFang SC',-apple-system,'Microsoft YaHei',sans-serif;
  line-height:1.7; font-size:16.5px; -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
/* ── 三栏骨架 ── */
.layout{display:grid; grid-template-columns:248px minmax(0,1fr) 248px; gap:32px;
  max-width:1320px; margin:0 auto; padding:28px 28px 60px;}
/* 左：常驻目录 */
.doc-nav{position:sticky; top:24px; align-self:start; height:calc(100vh - 48px); overflow-y:auto;}
.doc-brand{display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; margin-bottom:18px;}
.doc-brand .b-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}
.doc-brand span{color:var(--fg-dim);font-weight:500;font-size:12.5px;}
.doc-nav-title{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--fg-dim);
  margin:6px 0 10px; font-weight:600;}
.doc-toc{list-style:none; border-left:2px solid var(--line);}
.doc-toc li a{display:block; padding:6px 0 6px 14px; margin-left:-2px; border-left:2px solid transparent;
  color:var(--fg-dim); font-size:14px; transition:.18s;}
.doc-toc li a:hover{color:var(--fg);}
.doc-toc li a.active{color:var(--accent); border-left-color:var(--accent); font-weight:600;}
/* 中：阅读栏 */
.doc-main{min-width:0;}
.cover{width:100%; height:260px; object-fit:cover; border-radius:var(--radius); border:1px solid var(--line); margin-bottom:22px;}
.badge{display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600;
  color:var(--accent); background:var(--accent-soft); padding:5px 12px; border-radius:999px; margin-bottom:14px;}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.doc-main h1{font-size:30px; line-height:1.3; font-weight:700; letter-spacing:-.01em; margin-bottom:14px;}
.doc-main h1 strong{color:var(--accent-2);}
.meta{display:flex; flex-wrap:wrap; align-items:center; gap:0; color:var(--fg-dim); font-size:13.5px; margin-bottom:18px;}
.meta span{padding:0 10px;} .meta span:first-child{padding-left:0;} .meta .dot{width:4px;height:4px;border-radius:50%;background:var(--fg-dim);padding:0;opacity:.6;}
.lead{font-size:17px; color:var(--fg-dim); background:var(--bg-soft); border:1px solid var(--line);
  border-left:3px solid var(--accent); border-radius:10px; padding:14px 18px; margin-bottom:30px;}
/* 右：元信息栏 */
.doc-rail{position:sticky; top:24px; align-self:start; display:flex; flex-direction:column; gap:16px;}
.rail-card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;}
.rail-card h4{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--fg-dim); margin-bottom:12px; font-weight:600;}
.rail-row{display:flex; justify-content:space-between; font-size:13.5px; padding:5px 0; color:var(--fg-dim);}
.rail-row b{color:var(--fg); font-weight:600;}
.rail-tags{display:flex; flex-wrap:wrap; gap:7px;}
.rail-tags a{font-size:12.5px; color:var(--accent); background:var(--accent-soft); padding:3px 10px; border-radius:999px; transition:.15s;}
.rail-tags a:hover{background:var(--accent); color:#fff;}
/* ── 正文区块库（类名与 v2 一致，可 1:1 移植）── */
.article-body{max-width:var(--maxw);}
.article-body h2{font-size:23px; font-weight:700; margin:42px 0 16px; padding-top:10px; letter-spacing:-.01em;}
.article-body h2:first-child{margin-top:0;}
.article-body h3{font-size:18px; font-weight:600; margin:26px 0 12px; color:var(--fg);}
.article-body p{margin:14px 0; color:var(--fg);}
.article-body strong{color:var(--fg); font-weight:700;}
.key{color:var(--key); font-weight:700;}
code{font-family:'JetBrains Mono',monospace; font-size:13.5px; background:var(--panel-2);
  color:var(--accent-2); padding:2px 6px; border-radius:6px; border:1px solid var(--line);}
.info-box{background:var(--accent-soft); border:1px solid rgba(99,102,241,.3); border-radius:12px; padding:14px 18px; margin:20px 0;}
.info-box p{margin:6px 0;}
.info-box strong{color:var(--accent);}
.mod-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:18px 0;}
.mc-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.mc-num{width:24px;height:24px;border-radius:7px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;
  display:flex;align-items:center;justify-content:center;flex:none;}
.mc-title{font-weight:700;font-size:15.5px;}
.mc-desc{color:var(--fg-dim);font-size:14.5px;margin:0;}
.pull-quote{border-left:4px solid var(--accent); background:var(--bg-soft); padding:14px 20px; border-radius:0 10px 10px 0; margin:22px 0; font-size:16px;}
.pull-quote .key{color:var(--key);}
.code-block{background:#0b0e13; border:1px solid var(--line); border-radius:12px; overflow:hidden; margin:20px 0;}
.code-block pre{margin:0; padding:16px 18px; overflow-x:auto; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.65; color:#c9d3e0;}
.c-com{color:#5f7a8c;} .c-key{color:#a78bfa; font-weight:600;}
.section-img{margin:24px 0;}
.section-img svg{width:100%; height:auto; background:var(--bg-soft); border:1px solid var(--line); border-radius:12px;}
.caption{font-size:13px; color:var(--fg-dim); text-align:center; margin-top:8px;}
.table-wrap{overflow-x:auto; margin:22px 0; border:1px solid var(--line); border-radius:12px;}
.table-wrap table{border-collapse:collapse; width:100%; font-size:14px;}
.table-wrap th,.table-wrap td{border-bottom:1px solid var(--line); padding:11px 14px; text-align:left;}
.table-wrap th{background:var(--accent-soft); color:var(--accent); font-weight:700; font-size:13px;}
.table-wrap tr:last-child td{border-bottom:none;}
.back-link{display:inline-block; margin-top:36px; color:var(--accent); font-weight:600; font-size:14.5px;}
.back-link:hover{text-decoration:underline;}
/* ── 页脚 ── */
.footer{max-width:1320px; margin:0 auto; padding:26px 28px 50px; border-top:1px solid var(--line); color:var(--fg-dim); font-size:13px;}
/* ── 响应式 ── */
@media (max-width:1100px){
  .layout{grid-template-columns:1fr; gap:0; padding:22px 18px 50px;}
  .doc-nav,.doc-rail{position:static; height:auto; overflow:visible;}
  .doc-nav{margin-bottom:18px;} .doc-rail{margin-top:34px; flex-direction:column;}
  .cover{height:200px;}
}
</style>
  <link rel="stylesheet" href="/assets/fx.css">
  <script src="/assets/fx.js" defer></script>
</head>
<body>
<div class="layout">
  <!-- 左：常驻目录 -->
  <aside class="doc-nav">
    <div class="doc-brand"><span class="b-dot"></span>Appin.site <span>{{CATEGORY_LABEL}}</span></div>
    <div class="doc-nav-title">目录</div>
    <ul class="doc-toc">
      {{TOC_LINKS}}
    </ul>
  </aside>

  <!-- 中：阅读栏 -->
  <main class="doc-main">
    <img class="cover" src="{{HERO_COVER}}" alt="{{TITLE}}">
    <div class="badge"><span class="dot"></span>{{HERO_BADGE}}</div>
    <h1>{{TITLE_HTML}}</h1>
    <div class="meta">{{HERO_META}}</div>
    <p class="lead">{{EXCERPT}}</p>

    <article class="article-body">
{{BODY}}
    </article>
  </main>

  <!-- 右：元信息栏 -->
  <aside class="doc-rail">
    <div class="rail-card">
      <h4>本文信息</h4>
      <div class="rail-row"><span>栏目</span><b>{{CATEGORY_LABEL}}</b></div>
      <div class="rail-row"><span>发布</span><b>{{DATE}}</b></div>
      <div class="rail-row"><span>模板</span><b>B · 文档式</b></div>
    </div>
    <div class="rail-card">
      <h4>标签</h4>
      <div class="rail-tags">{{TAGS}}</div>
    </div>
  </aside>
</div>

<footer class="footer">
  <div class="footer-bottom">
    <span>© 2026 Appin.site · {{CATEGORY_LABEL}} ｜ 本文由八戒整理，所有账号凭证、IP、密码、Cookie、Token 均已打码。</span>

    </button>
  </div>
</footer>

<script>
// 目录滚动高亮
(function(){
  var links = document.querySelectorAll('.doc-toc a');
  if(!links.length) return;
  var sections = [].map.call(links, function(a){ return document.querySelector(a.getAttribute('href')); }).filter(Boolean);
  if(!sections.length) return;
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var id = '#' + e.target.id;
        links.forEach(function(l){ l.classList.toggle('active', l.getAttribute('href')===id); });
      }
    });
  }, { rootMargin:'-70px 0px -65% 0px', threshold:0 });
  sections.forEach(function(s){ obs.observe(s); });
})();
// 主题切换
(function(){
  try{ if(localStorage.getItem('theme')==='light') document.body.classList.add('light'); }catch(e){}
})();
</script>
</body>
</html>
