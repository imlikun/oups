<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{EXCERPT}}">
<style>
/* ========== 模板B：现代宽屏风格 ========== */
/* 配色：紫色强调 #7c3aed，背景白色+浅灰卡片 */
:root {
  --bg: #ffffff;
  --bg-card: #f8f9fb;
  --bg-section: #f1f3f5;
  --text: #111827;
  --text-secondary: #4b5563;
  --text-tertiary: #9ca3af;
  --accent: #7c3aed;
  --accent-light: rgba(124,58,237,0.06);
  --accent-glow: rgba(124,58,237,0.12);
  --border: rgba(0,0,0,0.06);
  --radius: 12px;
  --max-text: 800px;
  --max-wide: 1200px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.9; font-size:16px;
  -webkit-font-smoothing:antialiased;
}

/* ---- Nav ---- */
.nav { position:fixed; top:0; left:0; right:0; z-index:200;
  background:rgba(255,255,255,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border); transition:box-shadow 0.3s; }
.nav.scrolled { box-shadow:0 1px 8px rgba(0,0,0,0.04); }
.nav-inner { max-width:var(--max-wide); margin:0 auto; padding:0 32px;
  display:flex; align-items:center; justify-content:space-between; height:56px; }
.nav-logo { font-size:16px; font-weight:700; color:var(--accent); text-decoration:none; letter-spacing:-0.3px; }
.nav-logo span { color:var(--text-tertiary); font-weight:400; font-size:12px; margin-left:6px; }
.nav-links { display:flex; gap:28px; align-items:center; list-style:none; }
.nav-links a { color:var(--text-secondary); text-decoration:none; font-size:13px; font-weight:500; transition:color 0.2s; position:relative; }
.nav-links a:hover, .nav-links a.active { color:var(--accent); }
.nav-links a.active::after { content:''; position:absolute; bottom:-18px; left:0; right:0; height:2px; background:var(--accent); border-radius:1px; }

/* ---- Hero ---- */
.hero { padding:120px 32px 60px; text-align:center; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:-60%; left:-20%; width:140%; height:200%;
  background:radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.04) 0%, transparent 70%);
  pointer-events:none; }
.hero-inner { max-width:800px; margin:0 auto; position:relative; }
.hero-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px;
  background:var(--accent-light); color:var(--accent); font-size:11px; font-weight:600; letter-spacing:0.08em; margin-bottom:20px; }
.hero-badge .dot { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.hero h1 { font-size:clamp(26px,4.5vw,42px); font-weight:800; letter-spacing:-1.5px; line-height:1.15;
  max-width:780px; margin:0 auto 20px; color:#0f172a; }
.hero h1 em { color:var(--accent); font-style:normal; }
.hero-desc { color:var(--text-secondary); font-size:16px; max-width:600px; margin:0 auto 32px; line-height:1.7; }
.hero-meta { display:flex; justify-content:center; align-items:center; gap:16px; font-size:13px; color:var(--text-tertiary); flex-wrap:wrap; }
.hero-meta .sep { width:3px; height:3px; border-radius:50%; background:#d1d5db; }
.hero-stats { display:flex; justify-content:center; gap:40px; margin-top:36px; flex-wrap:wrap; }
.hero-stat { text-align:center; }
.hero-stat .num { font-size:28px; font-weight:800; color:var(--accent); letter-spacing:-1px; }
.hero-stat .label { font-size:12px; color:var(--text-tertiary); margin-top:2px; }

/* ---- Summary Card (between Hero and Article) ---- */
.summary-card { max-width:var(--max-wide); margin:-20px auto 0; padding:0 32px; position:relative; z-index:1; }
.summary-inner { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:32px 40px;
  display:flex; gap:32px; align-items:flex-start; box-shadow:0 4px 24px rgba(0,0,0,0.03); }
.summary-icon { font-size:36px; flex-shrink:0; width:56px; height:56px; display:flex; align-items:center; justify-content:center;
  background:var(--accent-light); border-radius:12px; }
.summary-text h3 { font-size:14px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
.summary-text p { font-size:15px; color:var(--text-secondary); line-height:1.75; margin:0; }
.summary-text .key-points { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.summary-text .key-points span { font-size:12px; padding:4px 12px; background:#fff; border:1px solid var(--border); border-radius:16px; color:var(--text-secondary); }

/* ---- Article Body ---- */
.article-wrap { max-width:var(--max-wide); margin:0 auto; padding:40px 32px 100px; }
.article-body { max-width:var(--max-text); margin:0 auto; }
.article-body h2 { font-size:28px; font-weight:800; margin:64px 0 24px; color:#0f172a; letter-spacing:-0.7px;
  position:relative; padding-left:20px; }
.article-body h2::before { content:''; position:absolute; left:0; top:6px; bottom:6px; width:4px; border-radius:2px; background:var(--accent); }
.article-body h2:first-child { margin-top:0; }
.article-body h3 { font-size:19px; font-weight:700; margin:36px 0 14px; color:#1e293b; }
.article-body h4 { font-size:15px; font-weight:600; margin:24px 0 10px; color:var(--accent); text-transform:uppercase; letter-spacing:0.05em; }
.article-body p { margin-bottom:22px; color:#334155; }
.article-body strong { font-weight:700; color:#0f172a; }
.article-body ul, .article-body ol { margin:0 0 22px 20px; }
.article-body li { margin-bottom:8px; line-height:1.85; color:#334155; }
.article-body a { color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(124,58,237,0.25); transition:border-color 0.2s; }
.article-body a:hover { border-bottom-color:var(--accent); }

/* Section Image (generated illustration) */
.section-img { margin:32px 0; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
.section-img img { width:100%; display:block; }
.section-img .caption { font-size:12px; color:var(--text-tertiary); padding:10px 16px; background:var(--bg-card); text-align:center; }

/* Pull Quote */
.pull-quote { margin:40px 0; padding:24px 28px; border-left:4px solid var(--accent);
  background:var(--accent-light); border-radius:0 10px 10px 0; }
.pull-quote p { font-size:17px; font-weight:500; color:#0f172a; margin:0; font-style:italic; line-height:1.7; }

/* Info Box */
.info-box { margin:32px 0; padding:22px 28px; background:var(--bg-card); border-radius:var(--radius); border:1px solid var(--border); }
.info-box .info-title { font-size:12px; font-weight:700; color:var(--accent); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.07em; }
.info-box p { margin-bottom:0; font-size:14px; color:var(--text-secondary); }

/* Highlight Box */
.highlight-box { margin:32px 0; padding:24px 30px; background:linear-gradient(135deg,rgba(124,58,237,0.04),rgba(124,58,237,0.08));
  border-radius:var(--radius); border:1px solid rgba(124,58,237,0.12); }
.highlight-box p { margin-bottom:0; font-size:15px; color:#1e293b; line-height:1.75; }

/* Steps */
.step-list { counter-reset:step; list-style:none; margin:28px 0 40px; }
.step-list li { counter-increment:step; margin-bottom:20px; padding:24px 28px; background:#fff;
  border:1px solid var(--border); border-radius:var(--radius); position:relative; box-shadow:0 2px 8px rgba(0,0,0,0.02); }
.step-list li::before { content:counter(step); position:absolute; top:-10px; left:20px;
  background:var(--accent); color:#fff; width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; }
.step-list li .step-label { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:8px; display:block; padding-top:8px; }
.step-list li p { margin-bottom:4px; font-size:15px; }

/* QA Checklist */
.checklist { list-style:none; margin:24px 0 36px; }
.checklist li { padding:12px 18px; margin-bottom:8px; border-radius:10px; background:var(--bg-card); display:flex; align-items:center; gap:10px; font-size:14px; border:1px solid var(--border); }
.checklist li::before { content:"✓"; display:inline-flex; align-items:center; justify-content:center;
  width:22px; height:22px; border-radius:50%; background:var(--accent-light); color:var(--accent); font-size:12px; font-weight:800; flex-shrink:0; }

/* Tables */
.table-wrap { margin:32px 0; overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); }
.table-wrap table { width:100%; border-collapse:collapse; font-size:14px; }
.table-wrap thead { background:var(--bg-section); }
.table-wrap th { padding:14px 18px; text-align:left; font-weight:700; font-size:12px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.05em; border-bottom:2px solid var(--border); }
.table-wrap td { padding:14px 18px; border-bottom:1px solid var(--border); color:#334155; line-height:1.65; }
.table-wrap tr:last-child td { border-bottom:none; }
.table-wrap tbody tr:hover { background:var(--accent-light); }

/* Code Block */
.code-block { margin:28px 0; background:#1e1e2e; color:#cdd6f4; padding:20px 24px; border-radius:var(--radius); font-size:13px; line-height:1.7;
  overflow-x:auto; font-family:"SF Mono","Fira Code","Menlo",monospace; }
.code-block .comment { color:#6c7086; }
.code-block .cmd { color:#89b4fa; }

/* Tag Cloud */
.tag-cloud { display:flex; flex-wrap:wrap; gap:8px; margin:48px 0 0; padding-top:36px; border-top:1px solid var(--border); }
.tag-cloud a { font-size:12px; color:var(--text-secondary); background:var(--bg-card); padding:6px 14px; border-radius:18px; text-decoration:none; border:1px solid var(--border); transition:all 0.2s; }
.tag-cloud a:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

/* Back */
.back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; margin:40px 0 0; transition:color 0.2s; }
.back-link:hover { color:var(--accent); }
.back-link::before { content:"←"; font-size:16px; }

/* Footer */
.footer { text-align:center; padding:36px 32px; border-top:1px solid var(--border); color:var(--text-tertiary); font-size:13px; }
.footer a { color:var(--accent); text-decoration:none; }

/* Responsive */
@media (max-width:900px) {
  .summary-inner { flex-direction:column; padding:24px; }
  .hero h1 { font-size:28px; }
  .article-wrap { padding:24px 16px 80px; }
  .article-body h2 { font-size:24px; }
}
@media (max-width:600px) {
  .hero { padding:100px 16px 40px; }
  .hero h1 { font-size:24px; }
  .hero-desc { font-size:14px; }
  .hero-stats { gap:20px; }
  .summary-inner { padding:20px; }
  .article-body h2 { font-size:21px; padding-left:16px; }
  .article-body h3 { font-size:17px; }
  .pull-quote p { font-size:15px; }
}
</style>
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-inner">
    <a href="/craft/" class="nav-logo">← 返回</a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/craft/" class="active">技艺录</a></li>
      <li><a href="/video-lab/">视频剪辑</a></li>
    </ul>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-badge"><span class="dot"></span>{{BADGE}}</div>
    <h1>{{TITLE_HTML}}</h1>
    <p class="hero-desc">{{EXCERPT}}</p>
    <div class="hero-meta">
      <span>李坤</span><span class="sep"></span>
      <span>{{DATE}}</span><span class="sep"></span>
      <span>{{WORD_COUNT}}</span>
    </div>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">{{SECTIONS}}</div><div class="label">个章节</div></div>
      <div class="hero-stat"><div class="num">{{TAGS_COUNT}}</div><div class="label">个标签</div></div>
      <div class="hero-stat"><div class="num">{{READ_TIME}}</div><div class="label">分钟阅读</div></div>
    </div>
  </div>
</section>

<!-- Summary Card -->
<div class="summary-card">
  <div class="summary-inner">
    <div class="summary-icon">📋</div>
    <div class="summary-text">
      <h3>文章摘要</h3>
      <p>{{SUMMARY}}</p>
      <div class="key-points">{{KEY_POINTS}}</div>
    </div>
  </div>
</div>

<!-- Article -->
<div class="article-wrap">
  <article class="article-body">
    {{BODY}}
  </article>

  <div class="tag-cloud">
    {{TAGS}}
  </div>
  <a href="/craft/" class="back-link">返回技艺录</a>
</div>

<footer class="footer">
  <p>© 2026 李坤 · <a href="/">返回首页</a> · <a href="/craft/">技艺录</a></p>
</footer>

<script>
(function() {
  // Nav scroll shadow
  var nav = document.getElementById('nav');
  window.addEventListener('scroll', function() {
    nav.classList.toggle('scrolled', window.scrollY > 10);
  });
})();
</script>

</body>
</html>
