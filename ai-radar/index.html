:root {

  --card-bg: rgba(255,255,255,0.025);
  --card-hover: rgba(255,255,255,0.045);
  --text: #e8e8ed;

  --border-hover: rgba(255,255,255,0.1);
  --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px;

  --cat-product: #c084fc; --cat-product-bg: rgba(192,132,252,0.12);

  --cat-tip: #f472b6; --cat-tip-bg: rgba(244,114,182,0.12);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",-apple-system,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.72;font-size:15px;

}
/* Dot grid + ambient glow */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.09;
  background-image:radial-gradient(rgba(124,58,237,0.16) 1px,transparent 1px);
  background-size:34px 34px;
}
body::after{
  content:'';position:fixed;top:-20%;right:-10%;width:70%;height:70%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse,rgba(124,58,237,0.05),transparent 70%);
}

/* ── Nav ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(6,6,14,0.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.04);}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;height:52px;}
.nav-logo{font-size:14px;font-weight:600;color:var(--text);text-decoration:none;

.nav-logo svg{width:17px;height:17px;stroke:var(--accent)}
.nav-title{font-size:12px;font-weight:500;color:var(--text-tertiary);letter-spacing:0.03em}
.nav-pulse{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-tertiary)}
.nav-pulse .dot{width:6px;height:6px;border-radius:50%;background:#34d399;
  box-shadow:0 0 8px rgba(52,211,153,0.4);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* ── Hero ── */
.hero{position:relative;z-index:1;padding:140px 0 84px;text-align:center;overflow:hidden;
  background:linear-gradient(180deg,rgba(124,58,237,0.07) 0%,transparent 65%);}
.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:640px;height:440px;
  background:radial-gradient(ellipse at center,rgba(124,58,237,0.14),transparent 70%);
  pointer-events:none;}
.hero::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.06;
  background-image:radial-gradient(rgba(255,255,255,0.15) 0.5px,transparent 0.5px);
  background-size:26px 26px;}
.hero-badge{display:inline-flex;align-items:center;gap:7px;
  padding:6px 18px;border-radius:20px;background:rgba(124,58,237,0.15);
  border:1px solid rgba(124,58,237,0.25);color:rgba(255,255,255,0.85);
  font-size:11px;font-weight:600;letter-spacing:0.06em;margin-bottom:28px;
  position:relative;z-index:1}
.hero-badge .bdot{width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent)}
.hero h1{font-size:clamp(30px,6vw,54px);font-weight:700;letter-spacing:-1.8px;

.hero-stat{text-align:center}
.hero-stat .num{font-size:44px;font-weight:700;letter-spacing:-1.5px;
  font-variant-numeric:tabular-nums;font-family:"SF Mono","Fira Code","Menlo",monospace;
  color:#e0d8f0}
.hero-stat .num.purple{background:linear-gradient(135deg,#c084fc,#818cf8,#00d4ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-stat .label{font-size:11px;color:var(--text-tertiary);margin-top:6px;letter-spacing:0.04em}

/* ── Filters ── */
.filters-wrap{position:relative;z-index:1;display:flex;justify-content:center;gap:6px;

.f-chip{padding:8px 20px;border-radius:22px;border:1px solid rgba(255,255,255,0.05);

.f-chip .count{font-size:10px;margin-left:4px;opacity:0.5}

/* ── Grid ── */
.grid{position:relative;z-index:1;max-width:1200px;margin:0 auto;
  padding:0 28px 80px;

.card{background:var(--card-bg);border-radius:var(--radius-lg);

.card::before{content:'';position:absolute;top:12px;left:0;bottom:12px;width:2px;
  border-radius:0 2px 2px 0;opacity:0.35;transition:opacity 0.3s,width 0.3s}

.card.cat-product::before{background:#c084fc}
.card.cat-industry::before{background:#34d399}

.cat-paper{background:var(--cat-paper-bg);color:var(--cat-paper)}
.cat-tip{background:var(--cat-tip-bg);color:var(--cat-tip)}

.card-time{font-size:11px;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0}

.src-card.cat-dev .src-tag .sdot{background:#34d399}
.src-card.cat-biz .src-tag .sdot{background:#fbbf24}

</style>

00Z","summary":"北京大学集成电路学院联合中科院上海微系统所，发布全球首款基于可控存内计算的忆阻器神经动力学芯片，首次将单步运算时延压缩至2.12毫秒。芯片采用40纳米工艺，存内计算阵列与外围电路总面积0.28平方毫米，运行频率50 MHz，单步积分仅需9级流水。在脑皮层重建等任务中较当前GPU提速50至478倍，突破神经动力学实时计算瓶颈。相关成果7月3日发表于《科学》。","category":"paper","score":74,"selected":true},{"id":"cmr5cef1q017islc779xjrcy6","title":"pxpipe：通过图像化压缩输入token降低Claude Code成本","title_en":"通过将代码转换为图像并由模型进行OCR识别，将《Fable》的开发成本降低了60%","url":"https://github.com/teamchong/pxpipe","permalink":"https://aihot.virxact.com/items/cmr5cef1q017islc779xjrcy6","source":"Hacker News 热门（buzzing.cc 中文翻译）","publishedAt":"2026-07-03T19:19:45.726Z","summary":"pxpipe是一个本地代理，将系统提示、工具文档和历史记录等密集文本渲染为PNG图像，利用图像token成本取决于像素尺寸的特性压缩输入token。在Fable 5模型上，约25k文本token压缩为约2.7k图像token，端到端账单降低59-70%。SWE-bench Lite 10个实例全部通过，成本从$54降至$27；SWE-bench Pro 19对测试中18对判定一致，单次请求成本降低约60%。该方法有损（精确ID等需保持文本），默认仅处理`claude-fable-5`请求，可通过`PXPIPE_MODELS`变量控制。","category":"tip","score":83,"selected":true},{"id":"cmr5blxyu00ykslc7kiaaxqam","title":"Fable 的判断力：Simon Willison 从 Claude Code 团队获得的效率技巧","title_en":"Fable's judgement","url":"https://simonwillison.net/2026/Jul/3/judgement","permalink":"https://aihot.virxact.com/items/cmr5blxyu00ykslc7kiaaxqam","source":"Simon Willison 博客","publishedAt":"2026-07-03T18:51:06.000Z","summary":"Simon Willison 在 AIE 上与 Claude Code 团队交流后建议，让 Fable（以及 Opus）用自己的判断力工作，而非硬性规定行为。例如，直接让 Fable 自行决定何时编写测试，比给出具体规则更好。为应对价格即将上涨、节省 Fable token，Jesse Vincent 的另一个技巧是告诉 Fable 将较小任务委托给较低功耗模型（Sonnet 用于实质性实现、Haiku 用于机械修改），主循环保留判断、审计和数据合成等任务。Willison 已将提示词存入 Claude Code 记忆文件，实际效果良好，Fable token 消耗速度明显下降。","category":"tip","score":73,"selected":true}]}</script>

<script>
(function(){
  var raw = document.getElementById('ai-data').textContent.trim();

  var catMap = {
    'ai-models':  { label:'模型发布', css:'cat-model' },
    'ai-products':{ label:'产品更新', css:'cat-product' },
    'industry':   { label:'行业动态', css:'cat-industry' },
    'paper':      { label:'论文研究', css:'cat-paper' },
    'tip':        { label:'技巧观点', css:'cat-tip' }
  };

  function init(data) {
    var items = data && data.items || [];
    if (!items.length) {
      document.getElementById('grid').innerHTML =
        '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>暂无最新资讯，稍后再来看看</p></div>';
      return;
    }

    items.sort(function(a,b){ return new Date(b.publishedAt) - new Date(a.publishedAt); });

    var cats = {};
    var sources = {};
    items.forEach(function(it){
      cats[it.category] = (cats[it.category]||0) + 1;
      sources[it.source] = true;
    });
    document.getElementById('totalCount').textContent = items.length;
    document.getElementById('catCount').textContent = Object.keys(cats).length;
    document.getElementById('topSource').textContent = Object.keys(sources).length;

    ['all','ai-models','ai-products','industry','paper','tip'].forEach(function(c){
      var el = document.getElementById('cnt-' + (c === 'all' ? 'all' : c.replace('ai-','')));
      if (el) el.textContent = c === 'all' ? items.length : (cats[c] || 0);
    });

    function timeAgo(iso) {
      var diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff/60) + ' 分钟前';
      if (diff < 86400) return Math.floor(diff/3600) + ' 小时前';
      if (diff < 172800) return '昨天';
      var d = new Date(iso);
      return (d.getMonth()+1) + '月' + d.getDate() + '日';
    }

    function catLabel(c) { return catMap[c] ? catMap[c].label : c; }
    function catCSS(c) { return catMap[c] ? catMap[c].css : ''; }

    function scoreStars(s) {
      var c = Math.round((s||50)/20);
      var html = '';
      for (var i=0;i<5;i++) html += i < c ? '★' : '☆';
      return html;
    }

    renderGrid(items, catLabel, catCSS, timeAgo, scoreStars);

    document.getElementById('filters').addEventListener('click', function(e){
      var chip = e.target.closest('.f-chip');
      if (!chip) return;
      document.querySelectorAll('.f-chip').forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
      var cat = chip.dataset.cat;
      var filtered = cat === 'all' ? items : items.filter(function(i){ return i.category === cat; });
      renderGrid(filtered, catLabel, catCSS, timeAgo, scoreStars);
    });
  }

  function renderGrid(items, catLabel, catCSS, timeAgo, scoreStars) {
    var idx = 0;
    var html = items.length === 0
      ? '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>该分类暂无内容</p></div>'
      : items.map(function(it){
          idx++;
          return '<a href="'+ it.url +'" target="_blank" class="card card-enter '+ catCSS(it.category) +'" style="animation-delay:'+ (idx*0.03) +'s">' +
            '<div class="card-top">' +
              '<span class="card-cat '+ catCSS(it.category) +'">'+ catLabel(it.category) +'</span>' +
              '<span class="card-score">'+ scoreStars(it.score) +' '+ (it.score||'') +'</span>' +
            '</div>' +
            '<div class="card-title">'+ it.title +'</div>' +
            '<div class="card-summary">'+ (it.summary || '') +'</div>' +
            '<div class="card-footer">' +
              '<span class="card-source">'+ it.source +'</span>' +
              '<span class="card-time">'+ timeAgo(it.publishedAt) +'</span>' +
            '</div>' +
          '</a>';
        }).join('');
    document.getElementById('grid').innerHTML = html;
  }

  try {
    var data = JSON.parse(raw);
    if (data && typeof data === 'object' && !data.items && !data.count) {
      init(data);
    } else {
      init(data);
    }
  } catch(e) {
    // 尝试清洗非法控制字符后重试
    try {
      var cleaned = raw.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
      var data = JSON.parse(cleaned);
      init(data);
    } catch(e2) {
      document.getElementById('grid').innerHTML =
        '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>数据加载失败，请稍后刷新</p></div>';
    }
  }

  var sourcesData = [
    {
      id: 'labs', css: 'cat-labs', icon: '🔬', label: 'Official AI Labs',
      items: ['OpenAI','Anthropic','DeepMind','Google AI','Meta','NVIDIA','HuggingFace','Stability','Mistral','Cohere']
    },
    {
      id: 'cn', css: 'cat-cn', icon: '🗞', label: '中文 AI 媒体',
      items: ['机器之心','量子位','InfoQ','宝玉','少数派','36氪']
    },
    {
      id: 'overseas', css: 'cat-overseas', icon: '🌐', label: '海外科技媒体',
      items: ['The Verge','TechCrunch','Ars Technica','Wired','VentureBeat','MIT Tech Review']
    },
    {
      id: 'dev', css: 'cat-dev', icon: '💻', label: '开发者 & 学术',
      items: ['Simon Willison','Karpathy','ArXiv','PapersWithCode','Hacker News']
    },
    {
      id: 'biz', css: 'cat-biz', icon: '💼', label: '商业 & 投资',
      items: ['a16z','Sequoia','DeepLearning.AI','Import AI']
    }
  ];

  function renderSources() {
    var total = 0;
    var html = sourcesData.map(function(cat) {
      total += cat.items.length;
      var tags = cat.items.map(function(s) {
        return '<span class="src-tag"><span class="sdot"></span>' + s + '</span>';
      }).join('');
      return '<div class="src-card ' + cat.css + '">' +
        '<div class="src-card-header">' +
          '<div class="src-card-icon">' + cat.icon + '</div>' +
          '<div class="src-card-title">' + cat.label + '</div>' +
          '<div class="src-card-count">' + cat.items.length + ' 个信源</div>' +
        '</div>' +
        '<div class="src-tags">' + tags + '</div>' +
      '</div>';
    }).join('');
    document.getElementById('sourcesGrid').innerHTML = html;
    document.getElementById('srcTotal').textContent = total;
  }

  renderSources();
})();
</script>
</body>
</html>
