<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频剪辑 — 李坤的影像探索</title>
<meta name="description" content="从剪辑软件到镜头叙事——李坤的视频剪辑学习与实践记录。">
<style>
:root {
  --bg: #0f0f12;
  --bg-card: #1a1a20;
  --text: #e8e6e3;
  --text-secondary: #a09e9b;
  --text-muted: #6b6a68;
  --accent: #f09030;
  --accent-light: rgba(240,144,48,0.12);
  --border: rgba(255,255,255,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',-apple-system,sans-serif;
  background:var(--bg); color:var(--text); line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

/* Nav */
.nav { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(15,15,18,0.88); backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
.nav-inner { max-width:1200px; margin:0 auto; padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:60px; }
.nav-logo { font-size:18px; font-weight:700; color:var(--accent); text-decoration:none; letter-spacing:-0.5px; }
.nav-links { display:flex; gap:24px; align-items:center; }
.nav-links a { color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; transition:color 0.2s; }
.nav-links a:hover, .nav-links a.active { color:var(--accent); }

/* Hero */
.hero { padding:120px 32px 60px; text-align:center; max-width:720px; margin:0 auto; position:relative; }
.hero::before { content:''; position:absolute; top:60px; left:50%; transform:translateX(-50%); width:300px; height:300px; background:radial-gradient(circle, rgba(240,144,48,0.08) 0%, transparent 70%); pointer-events:none; }
.hero-badge { position:relative; display:inline-block; padding:4px 16px; border-radius:20px; background:var(--accent-light); color:var(--accent); font-size:12px; font-weight:600; letter-spacing:1px; margin-bottom:20px; }
.hero h1 { position:relative; font-size:clamp(28px,5vw,48px); font-weight:700; letter-spacing:-1px; margin-bottom:16px; }
.hero p { position:relative; color:var(--text-secondary); font-size:16px; max-width:480px; margin:0 auto; }
.hero-stats { position:relative; display:flex; gap:40px; justify-content:center; margin-top:32px; }
.hero-stat { text-align:center; }
.hero-stat .num { font-size:32px; font-weight:700; color:var(--accent); }
.hero-stat .label { font-size:12px; color:var(--text-muted); margin-top:4px; }

/* Timeline Layout */
.timeline { max-width:900px; margin:0 auto; padding:0 32px 80px; position:relative; }
.timeline::before { content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:linear-gradient(180deg, var(--accent-light), var(--border), transparent); transform:translateX(-50%); }
.timeline-item { display:grid; grid-template-columns:1fr 60px 1fr; gap:0; margin-bottom:32px; align-items:start; position:relative; }
.timeline-item .dot { width:12px; height:12px; background:var(--accent); border-radius:50%; margin:28px auto 0; position:relative; z-index:1; box-shadow:0 0 12px rgba(240,144,48,0.4); }
.timeline-card { background:var(--bg-card); border-radius:14px; overflow:hidden; border:1px solid var(--border); text-decoration:none; color:inherit; display:block; transition:all 0.3s ease; }
.timeline-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.timeline-card-image { height:180px; background-size:cover; background-position:center; position:relative; }
.timeline-card-image .play-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:48px; height:48px; border-radius:50%; background:rgba(240,144,48,0.85); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; }
.timeline-card:hover .play-hint { opacity:1; }
.play-hint svg { width:20px; height:20px; fill:white; margin-left:3px; }
.timeline-card-image.fallback { display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, #1a1a25, #252530); font-size:40px; }
.timeline-card-body { padding:20px; }
.timeline-card-body h3 { font-size:16px; font-weight:600; margin-bottom:8px; line-height:1.4; }
.timeline-card-body p { font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:12px; }
.timeline-card-meta { display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text-muted); }
.timeline-card-meta .tags { display:flex; gap:4px; flex-wrap:wrap; }
.timeline-card-meta .tags span { padding:2px 6px; border-radius:4px; background:var(--accent-light); color:var(--accent); font-size:10px; }

/* Alternate sides */
.timeline-item.left {  }
.timeline-item.right {  }
@media (min-width:601px) {
  .timeline-item:nth-child(odd) .timeline-card { margin-right:0; }
}

/* Empty */
.empty { text-align:center; padding:80px 32px; color:var(--text-muted); }
.empty h3 { font-size:20px; margin-bottom:8px; color:var(--text-secondary); }

/* Footer */
.footer { text-align:center; padding:40px 32px; border-top:1px solid var(--border); color:var(--text-muted); font-size:13px; }
.footer a { color:var(--accent); text-decoration:none; }

@media (max-width:768px) {
  .timeline::before { left:22px; }
  .timeline-item { grid-template-columns:44px 1fr; }
  .timeline-item .dot { margin:24px auto 0; }
  .timeline-item .timeline-card { grid-column:2; }
  .hero-stats { gap:24px; }
}
@media (max-width:600px) {
  .nav-inner { padding:0 16px; }
  .timeline { padding:0 16px 60px; }
  .hero { padding:100px 16px 40px; }
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">← 李坤</a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="../craft/index.html">技艺录</a>
      <a href="index.html" class="active">视频剪辑</a>
    </div>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-badge">VIDEO LAB</div>
  <h1>视频剪辑</h1>
  <p>每一帧都是表达——用镜头记录、用剪辑叙事，从工具操作到创作思维。</p>
  <div class="hero-stats" id="heroStats"></div>
</section>

<section class="timeline" id="timeline">
  <div class="empty" id="empty" style="display:none"><h3>暂无作品</h3><p>视频剪辑探索还在路上，敬请期待。</p></div>
</section>

<footer class="footer">
  <p>© 2026 李坤 · <a href="../index.html">返回首页</a></p>
</footer>

<script>
(function() {
  var timeline = document.getElementById('timeline');
  var empty = document.getElementById('empty');
  var statsEl = document.getElementById('heroStats');

  function formatDate(d) {
    if (!d) return '';
    var date = new Date(d);
    return date.getFullYear() + '.' + (date.getMonth()+1) + '.' + date.getDate();
  }

  function render(articles) {
    var videoArts = articles.filter(function(a) {
      return a.category === 'video' && a.status === 'published';
    });

    videoArts.sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });

    if (videoArts.length === 0) {
      empty.style.display = 'block';
      statsEl.innerHTML = '';
      // Remove timeline card empty
      var existing = timeline.querySelector('.timeline-item');
      if (existing) existing.remove();
      return;
    }
    empty.style.display = 'none';

    var tagSet = {};
    videoArts.forEach(function(a) {(a.tags||[]).forEach(function(t){tagSet[t]=1;})});
    statsEl.innerHTML = '<div class="hero-stat"><div class="num">' + videoArts.length + '</div><div class="label">篇文章</div></div>' +
      '<div class="hero-stat"><div class="num">' + Object.keys(tagSet).length + '</div><div class="label">个技巧标签</div></div>';

    // Remove any existing timeline items except empty
    var existing = timeline.querySelectorAll('.timeline-item');
    existing.forEach(function(el) { el.remove(); });

    var html = '';
    for (var i = 0; i < videoArts.length; i++) {
      var a = videoArts[i];
      var tagStr = '';
      if (a.tags) {
        for (var t = 0; t < Math.min(a.tags.length, 3); t++) {
          tagStr += '<span>' + a.tags[t] + '</span>';
        }
        if (a.tags.length > 3) tagStr += '<span>+' + (a.tags.length-3) + '</span>';
      }

      html += '<div class="timeline-item">';
      html += '<div class="timeline-card">';
      html += '<a href="../article.html?id=' + a.id + '" style="text-decoration:none;color:inherit;display:block;">';
      if (a.image) {
        html += '<div class="timeline-card-image" style="background-image:url(../' + a.image + ')">';
        html += '<div class="play-hint"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>';
        html += '</div>';
      } else {
        html += '<div class="timeline-card-image fallback">🎬</div>';
      }
      html += '<div class="timeline-card-body">';
      html += '<h3>' + a.title + '</h3>';
      html += '<p>' + (a.excerpt || '').substring(0, 100) + (a.excerpt && a.excerpt.length > 100 ? '...' : '') + '</p>';
      html += '<div class="timeline-card-meta">';
      html += '<span>' + formatDate(a.date) + '</span>';
      html += '<span class="tags">' + tagStr + '</span>';
      html += '</div></div></a></div>';

      html += '<div class="dot"></div>';
      html += '<div></div>'; // right side empty
      html += '</div>';
    }

    // Insert after empty div
    empty.insertAdjacentHTML('afterend', html);
  }

  // Remove empty's sibling timeline items on subsequent renders handled above
  fetch('../content.json?' + Date.now())
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(data) { render(data.articles || []); })
    .catch(function() { empty.style.display = 'block'; empty.querySelector('h3').textContent = '加载失败'; });
})();
</script>
</body>
</html>
