function renderList(articles) {
  var list = document.getElementById('article-list');
  var countEl = document.getElementById('stat-count');
  var tagsEl = document.getElementById('stat-tags');
  var listCountEl = document.getElementById('list-count');

  if (!articles || articles.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">还没有随笔，敬请期待。</div></div>';
    countEl.textContent = '0';
    tagsEl.textContent = '0';
    listCountEl.textContent = '(0)';
    return;
  }

  var tags = new Set();
  articles.forEach(function(a) { (a.tags || []).forEach(function(t) { tags.add(t); }); });

  var html = '';
  for (var i = 0; i < articles.length; i++) {
    var a = articles[i];
    var date = a.date || '';
    var tagHtml = '';
    if (a.tags && a.tags.length) {
      tagHtml = '<div class="item-tags">';
      for (var t = 0; t < Math.min(a.tags.length, 3); t++) {
        tagHtml += '<span class="item-tag">' + a.tags[t] + '</span>';
      }
      tagHtml += '</div>';
    }
    var link = a.link || ('/notes/' + (a.slug || a.id) + '.html');
    html += '<a class="article-item" href="' + link + '">' +
      '<div class="item-title">' + (a.title || '无标题') + '</div>' +
      '<div class="item-excerpt">' + (a.excerpt || '') + '</div>' +
      '<div class="item-meta">' +
        '<span class="item-date">' + date + '</span>' +
        tagHtml +
      '</div>' +
    '</a>';
  }

  list.innerHTML = html;
  countEl.textContent = articles.length;
  tagsEl.textContent = tags.size;
  listCountEl.textContent = '(' + articles.length + ')';
}

// 从 content.json 加载
fetch('/content.json?' + Date.now())
  .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(function(data) {
    var notes = (data.articles || []).filter(function(a) {
      return a.category === 'notes' && a.status === 'published';
    });
    notes.sort(function(a, b) { return (b.date || '').localeCompare(a.date || ''); });
    renderList(notes);
  })
  .catch(function(e) {
    // fetch 失败 → 用静态后备
    renderList(STATIC_ARTICLES);
  });
